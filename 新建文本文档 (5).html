<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AI Chat (iPhone Ready)</title>
  <style>
    :root{
      --bg:#0b0f14;
      --panel:#0f1520;
      --panel-2:#121a26;
      --text:#e8eef7;
      --muted:#8aa0b8;
      --accent:#5cf2ff;
      --accent2:#9b7bff;
      --danger:#ff6b6b;
      --radius:16px;
      --shadow:0 8px 24px rgba(0,0,0,.35);
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    *{box-sizing:border-box}
    body{
      margin:0;background:var(--bg);color:var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .app{
      min-height:100svh;
      display:flex;flex-direction:column;
      padding:calc(12px + var(--safe-top)) 12px calc(12px + var(--safe-bottom));
      gap:10px;
    }
    header{
      display:flex;align-items:center;justify-content:space-between;
      padding:12px 14px;background:var(--panel);border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    header .title{font-weight:700;letter-spacing:.4px}
    header .badge{font-size:12px;color:var(--accent)}
    .config{
      display:grid;grid-template-columns:1fr 1fr;gap:8px;
    }
    .card{
      background:var(--panel);border-radius:var(--radius);padding:10px;box-shadow:var(--shadow);
    }
    label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
    input, select, textarea, button{
      font-size:14px;border:1px solid #1f2a3a;border-radius:12px;
      padding:10px;background:#0c121b;color:var(--text);outline:none;
      width:100%;
    }
    input:focus, select:focus, textarea:focus{border-color:var(--accent)}
    .row{display:flex;gap:8px}
    .btn{
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#001018;font-weight:700;border:none;cursor:pointer;
      height:42px;
    }
    .btn.secondary{background:#1a2433;color:var(--text)}
    .chat{
      flex:1;overflow:auto;background:var(--panel-2);border-radius:var(--radius);
      padding:12px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px;
    }
    .bubble{
      max-width:82%;padding:10px 12px;border-radius:14px;line-height:1.5;
      font-size:14px;word-break:break-word;
    }
    .me{align-self:flex-end;background:#1b2838;border:1px solid #26364d}
    .bot{align-self:flex-start;background:#141b26;border:1px solid #1f2a3a}
    .meta{font-size:12px;color:var(--muted);margin-top:4px}
    .composer{
      background:var(--panel);border-radius:var(--radius);padding:10px;box-shadow:var(--shadow);
      display:flex;flex-direction:column;gap:8px;
    }
    .files{
      display:flex;gap:8px;flex-wrap:wrap;
    }
    .pill{
      font-size:12px;padding:4px 8px;border-radius:999px;background:#182231;border:1px solid #243246;
      color:var(--muted);
    }
    .hint{font-size:12px;color:var(--muted)}
    .danger{color:var(--danger)}
    @media (max-width:640px){
      .config{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="title">AI Chat</div>
    <div class="badge">iPhone Ready</div>
  </header>

  <section class="config">
    <div class="card">
      <label>API Base URL</label>
      <input id="baseUrl" value="https://ai.xingyungept.cn" />
    </div>
    <div class="card">
      <label>API Key (Bearer)</label>
      <input id="apiKey" placeholder="sk-Q8vYwcKgvfXmBvS7iN2RktyRy7OWfHUPtQywIEvGHC57eyvK" />
    </div>
    <div class="card">
      <label>模型选择</label>
      <div class="row">
        <select id="model">
          <option value="gpt-5.2-codex">gpt-5.2-codex</option>
        </select>
        <input id="modelCustom" placeholder="自定义模型" />
      </div>
      <div class="hint">若有多个模型，手动输入并点“应用”。</div>
      <button class="btn secondary" id="applyModel">应用自定义模型</button>
    </div>
    <div class="card">
      <label>功能</label>
      <div class="hint">✅ 多轮对话 / ✅ 图片上传 / ✅ 语音识别</div>
      <div class="hint danger">前端直连需 CORS 放行</div>
    </div>
  </section>

  <section class="chat" id="chat"></section>

  <section class="composer">
    <textarea id="input" rows="3" placeholder="输入消息…"></textarea>
    <div class="files">
      <label class="pill">图片<input id="imageFile" type="file" accept="image/*" style="display:none"></label>
      <label class="pill">语音<input id="audioFile" type="file" accept="audio/*" capture style="display:none"></label>
      <span id="fileInfo" class="pill">未选择文件</span>
    </div>
    <div class="row">
      <button class="btn" id="sendBtn">发送</button>
      <button class="btn secondary" id="clearBtn">清空</button>
    </div>
    <div class="hint">图片将以 base64 方式随消息发送；语音会先转文字再发给模型。</div>
  </section>
</div>

<script>
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const baseUrlEl = document.getElementById('baseUrl');
const apiKeyEl = document.getElementById('apiKey');
const modelEl = document.getElementById('model');
const modelCustomEl = document.getElementById('modelCustom');
const fileInfoEl = document.getElementById('fileInfo');
const imageFileEl = document.getElementById('imageFile');
const audioFileEl = document.getElementById('audioFile');

let messages = []; // 多轮上下文
let imageDataUrl = null;
let audioFile = null;

document.getElementById('applyModel').onclick = () => {
  const v = modelCustomEl.value.trim();
  if(v){
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    modelEl.appendChild(opt);
    modelEl.value = v;
    modelCustomEl.value = "";
  }
};

imageFileEl.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if(!file){ imageDataUrl=null; fileInfoEl.textContent='未选择文件'; return; }
  const reader = new FileReader();
  reader.onload = () => {
    imageDataUrl = reader.result;
    fileInfoEl.textContent = `已选图片: ${file.name}`;
  };
  reader.readAsDataURL(file);
});

audioFileEl.addEventListener('change', (e)=>{
  audioFile = e.target.files[0] || null;
  fileInfoEl.textContent = audioFile ? `已选语音: ${audioFile.name}` : '未选择文件';
});

function addBubble(role, text){
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role==='user'?'me':'bot'}`;
  bubble.textContent = text;
  chatEl.appendChild(bubble);
  chatEl.scrollTop = chatEl.scrollHeight;
}

async function transcribeAudio(){
  if(!audioFile) return null;
  const url = baseUrlEl.value.replace(/\/$/,'') + '/v1/audio/transcriptions';
  const fd = new FormData();
  fd.append('file', audioFile);
  fd.append('model','whisper-1');
  const res = await fetch(url, {
    method:'POST',
    headers:{ 'Authorization': `Bearer ${apiKeyEl.value.trim()}` },
    body: fd
  });
  if(!res.ok) throw new Error('语音识别失败');
  const data = await res.json();
  return data.text || '';
}

document.getElementById('sendBtn').onclick = async () => {
  const baseUrl = baseUrlEl.value.trim();
  const apiKey = apiKeyEl.value.trim();
  const text = inputEl.value.trim();
  if(!baseUrl || !apiKey){ alert('请先填写 Base URL 与 API Key'); return; }

  let finalText = text;
  if(audioFile){
    try{
      const t = await transcribeAudio();
      if(t) finalText = (finalText ? finalText + "\n" : "") + t;
      audioFile = null;
      audioFileEl.value = "";
    }catch(e){
      alert(e.message); return;
    }
  }

  if(!finalText && !imageDataUrl){ alert('请输入内容或上传图片'); return; }

  addBubble('user', finalText || '[图片]');
  const content = [];
  if(finalText) content.push({type:'text', text: finalText});
  if(imageDataUrl) content.push({type:'image_url', image_url:{ url: imageDataUrl }});

  messages.push({role:'user', content: content.length===1 && content[0].type==='text' ? finalText : content});

  inputEl.value = '';
  imageDataUrl = null;
  fileInfoEl.textContent = '未选择文件';

  const url = baseUrl.replace(/\/$/,'') + '/v1/chat/completions';
  const body = {
    model: modelEl.value,
    messages
  };

  try{
    const res = await fetch(url, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify(body)
    });
    if(!res.ok) throw new Error('请求失败');
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || '无回复';
    addBubble('assistant', reply);
    messages.push({role:'assistant', content: reply});
  }catch(e){
    addBubble('assistant', '请求失败，请检查 CORS / Key / 模型名');
  }
};

document.getElementById('clearBtn').onclick = ()=>{
  messages = [];
  chatEl.innerHTML = '';
  inputEl.value = '';
  imageDataUrl = null; audioFile=null;
  fileInfoEl.textContent='未选择文件';
};
</script>
</body>
</html>
